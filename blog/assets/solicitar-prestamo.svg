<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="Solicitar préstamo online">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF5F3"/>
      <stop offset="100%" stop-color="#FFE4DD"/>
    </linearGradient>
    <linearGradient id="phoneGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4845F"/>
      <stop offset="100%" stop-color="#E8604C"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg2)"/>

  <!-- Decorative -->
  <circle cx="700" cy="90" r="55" fill="#E8604C" opacity="0.12"/>
  <circle cx="100" cy="360" r="60" fill="#F4845F" opacity="0.15"/>

  <!-- Phone mockup -->
  <g transform="translate(320,60)">
    <rect x="0" y="0" width="200" height="340" rx="26" ry="26" fill="#333"/>
    <rect x="10" y="12" width="180" height="316" rx="16" ry="16" fill="#fff"/>

    <!-- Top bar -->
    <rect x="10" y="12" width="180" height="50" rx="16" ry="16" fill="url(#phoneGrad)"/>
    <rect x="10" y="40" width="180" height="22" fill="url(#phoneGrad)"/>
    <text x="100" y="44" font-family="Arial, sans-serif" font-size="14" font-weight="800" fill="#fff" text-anchor="middle">ONE PRESTAMOS</text>

    <!-- Form fields -->
    <rect x="25" y="85" width="150" height="12" rx="3" fill="#E0E0E0"/>
    <rect x="25" y="105" width="150" height="26" rx="6" fill="#FFF5F3" stroke="#E8604C" stroke-width="1.5"/>

    <rect x="25" y="145" width="100" height="12" rx="3" fill="#E0E0E0"/>
    <rect x="25" y="165" width="150" height="26" rx="6" fill="#FFF5F3" stroke="#E8604C" stroke-width="1.5"/>

    <!-- Amount display -->
    <rect x="25" y="205" width="150" height="50" rx="8" fill="#FFF5F3"/>
    <text x="100" y="230" font-family="Arial, sans-serif" font-size="11" fill="#999" text-anchor="middle">Importe</text>
    <text x="100" y="250" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="#E8604C" text-anchor="middle">500 €</text>

    <!-- Button -->
    <rect x="25" y="270" width="150" height="36" rx="18" fill="url(#phoneGrad)"/>
    <text x="100" y="293" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">Solicitar</text>
  </g>

  <!-- Checkmarks floating -->
  <g transform="translate(590,140)">
    <circle cx="0" cy="0" r="32" fill="#E8604C"/>
    <path d="M -13 0 L -4 10 L 14 -10" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <g transform="translate(160,180)">
    <circle cx="0" cy="0" r="26" fill="#F4845F"/>
    <path d="M -10 0 L -3 8 L 11 -8" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <g transform="translate(620,300)">
    <circle cx="0" cy="0" r="22" fill="#D4503E"/>
    <path d="M -8 0 L -2 6 L 9 -6" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
