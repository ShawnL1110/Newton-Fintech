<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="Préstamo rápido">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF5F3"/>
      <stop offset="100%" stop-color="#FFE4DD"/>
    </linearGradient>
    <linearGradient id="coin1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4845F"/>
      <stop offset="100%" stop-color="#E8604C"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg1)"/>

  <!-- Decorative circles -->
  <circle cx="680" cy="80" r="50" fill="#E8604C" opacity="0.12"/>
  <circle cx="120" cy="370" r="70" fill="#F4845F" opacity="0.15"/>
  <circle cx="720" cy="380" r="30" fill="#E8604C" opacity="0.2"/>

  <!-- Stacked coins -->
  <g transform="translate(220,260)">
    <ellipse cx="0" cy="70" rx="95" ry="22" fill="#D4503E"/>
    <rect x="-95" y="35" width="190" height="35" fill="url(#coin1)"/>
    <ellipse cx="0" cy="35" rx="95" ry="22" fill="#F4845F"/>
    <ellipse cx="0" cy="35" rx="95" ry="22" fill="none" stroke="#fff" stroke-width="3" opacity="0.6"/>
    <text x="0" y="42" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#fff" text-anchor="middle">€</text>

    <ellipse cx="0" cy="10" rx="95" ry="22" fill="#D4503E"/>
    <rect x="-95" y="-25" width="190" height="35" fill="url(#coin1)"/>
    <ellipse cx="0" cy="-25" rx="95" ry="22" fill="#F4845F"/>
    <ellipse cx="0" cy="-25" rx="95" ry="22" fill="none" stroke="#fff" stroke-width="3" opacity="0.6"/>
    <text x="0" y="-18" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#fff" text-anchor="middle">€</text>

    <ellipse cx="0" cy="-50" rx="95" ry="22" fill="#D4503E"/>
    <rect x="-95" y="-85" width="190" height="35" fill="url(#coin1)"/>
    <ellipse cx="0" cy="-85" rx="95" ry="22" fill="#F4845F"/>
    <ellipse cx="0" cy="-85" rx="95" ry="22" fill="none" stroke="#fff" stroke-width="3" opacity="0.6"/>
    <text x="0" y="-78" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#fff" text-anchor="middle">€</text>
  </g>

  <!-- Lightning bolt for "fast" -->
  <g transform="translate(500,150)">
    <path d="M 40 0 L -20 110 L 20 110 L -10 220 L 60 90 L 20 90 Z"
          fill="#E8604C" stroke="#fff" stroke-width="4" stroke-linejoin="round"/>
  </g>

  <!-- Clock showing speed -->
  <g transform="translate(600,320)">
    <circle cx="0" cy="0" r="42" fill="#fff" stroke="#E8604C" stroke-width="5"/>
    <line x1="0" y1="0" x2="0" y2="-26" stroke="#E8604C" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="18" y2="8" stroke="#E8604C" stroke-width="4" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="4" fill="#E8604C"/>
  </g>
</svg>
