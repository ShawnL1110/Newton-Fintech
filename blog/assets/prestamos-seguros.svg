<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="Préstamos online seguros">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF5F3"/>
      <stop offset="100%" stop-color="#FFE4DD"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4845F"/>
      <stop offset="100%" stop-color="#D4503E"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg3)"/>

  <!-- Decorative -->
  <circle cx="130" cy="100" r="55" fill="#E8604C" opacity="0.12"/>
  <circle cx="680" cy="360" r="65" fill="#F4845F" opacity="0.15"/>
  <circle cx="700" cy="90" r="25" fill="#E8604C" opacity="0.2"/>

  <!-- Shield -->
  <g transform="translate(400,225)">
    <path d="M 0 -140
             C 60 -140, 110 -120, 130 -105
             L 130 0
             C 130 75, 75 125, 0 145
             C -75 125, -130 75, -130 0
             L -130 -105
             C -110 -120, -60 -140, 0 -140 Z"
          fill="url(#shieldGrad)" stroke="#fff" stroke-width="6"/>

    <!-- Inner shine -->
    <path d="M 0 -120
             C 50 -120, 90 -105, 108 -92
             L 108 -10
             C 108 55, 60 100, 0 120
             C -60 100, -108 55, -108 -10
             L -108 -92
             C -90 -105, -50 -120, 0 -120 Z"
          fill="none" stroke="#fff" stroke-width="2" opacity="0.5"/>

    <!-- Lock body -->
    <rect x="-38" y="-15" width="76" height="62" rx="8" fill="#fff"/>
    <!-- Lock shackle -->
    <path d="M -24 -15 L -24 -40 C -24 -60, 24 -60, 24 -40 L 24 -15"
          stroke="#fff" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Keyhole -->
    <circle cx="0" cy="10" r="6" fill="#E8604C"/>
    <rect x="-2" y="10" width="4" height="14" fill="#E8604C"/>
  </g>

  <!-- AEMIP badge -->
  <g transform="translate(160,320)">
    <rect x="-60" y="-22" width="120" height="44" rx="22" fill="#fff" stroke="#E8604C" stroke-width="2.5"/>
    <text x="0" y="6" font-family="Arial, sans-serif" font-size="16" font-weight="800" fill="#E8604C" text-anchor="middle">AEMIP ✓</text>
  </g>

  <!-- RGPD badge -->
  <g transform="translate(640,160)">
    <rect x="-55" y="-22" width="110" height="44" rx="22" fill="#fff" stroke="#F4845F" stroke-width="2.5"/>
    <text x="0" y="6" font-family="Arial, sans-serif" font-size="16" font-weight="800" fill="#F4845F" text-anchor="middle">RGPD ✓</text>
  </g>

  <!-- Small stars -->
  <g fill="#E8604C" opacity="0.7">
    <circle cx="240" cy="130" r="5"/>
    <circle cx="560" cy="100" r="4"/>
    <circle cx="600" cy="380" r="5"/>
    <circle cx="230" cy="400" r="4"/>
  </g>
</svg>
